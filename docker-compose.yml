services:

  postgres:
    image: postgres:16.4
    environment:
      - POSTGRES_DB=games_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - PGDATA=/data/postgres
    volumes:
      - ./postgres-data:/data/postgres
    ports:
      - "5432:5432"

  redis: 
    image: redis:8.8
    ports:
     - "6379:6379"